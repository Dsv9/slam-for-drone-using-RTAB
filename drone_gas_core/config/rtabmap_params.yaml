# RTAB-Map parameters for namespaced bringup.
#
# IMPORTANT: The stock rtabmap_launch/rtabmap.launch.py (current upstream) does NOT load
# arbitrary params_file entries; nodes run as /rtabmap/rgbd_odometry and /rtabmap/rtabmap.
# VO tuning for Gazebo is applied in launch via odom_args (CLI) in rtabmap_rgbd.launch.py.
# This file is still used if you load parameters manually, or if a future upstream launch
# merges a ParameterFile for the rtabmap namespace.

rtabmap:
  rgbd_odometry:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.25
      qos_image: 2
      qos_camera_info: 2
      # Gazebo: many matches fail geometry — relax gates (library min for MinInliers is 8).
      Vis/MinInliers: "10"
      Vis/MaxFeatures: "5000"
      Kp/MaxFeatures: "5000"
      Vis/InlierDistance: "0.22"
      Vis/CorNNDR: "0.78"
      Vis/MinFeatures: "8"
      GFTT/MinDistance: "1"
      Reg/Force3DoF: "true"
      Odom/ImageDecimation: "1"

  rtabmap:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.2
      qos_image: 2
      qos_camera_info: 2
      RGBD/LinearUpdate: "0.02"
      RGBD/AngularUpdate: "0.01"
      Grid/FromDepth: "true"
      Grid/3D: "false"
