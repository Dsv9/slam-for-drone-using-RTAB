# Namespaced mirrors of rgbd_odometry tuning (manual load / tooling only).
#
# VO tuning for sim is authoritative in launch/rtabmap_rgbd.launch.py (odom_args).
# Comments there explain EstimationType=0 vs PnP (type=1).

rtabmap:
  rgbd_odometry:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.35
      qos_image: 2
      qos_camera_info: 2
      Vis/EstimationType: "0"
      Vis/MinInliers: "8"
      Vis/MaxFeatures: "8000"
      Kp/MaxFeatures: "8000"
      Vis/InlierDistance: "0.52"
      Vis/PnPReprojError: "10"
      Vis/CorNNDR: "0.82"
      Vis/MinDepth: "0.25"
      Vis/MaxDepth: "8"
      Kp/MinDepth: "0.2"
      Kp/MaxDepth: "8"
      Vis/MinFeatures: "6"
      GFTT/MinDistance: "1"
      Reg/Force3DoF: "true"
      Odom/ImageDecimation: "1"

  rtabmap:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.35
      qos_image: 2
      qos_camera_info: 2
      RGBD/LinearUpdate: "0.02"
      RGBD/AngularUpdate: "0.01"
      Grid/FromDepth: "true"
      Grid/3D: "false"
