# Reference mirror of launch/rtabmap_rgbd.launch.py (odom_args / rtabmap_args are authoritative).

rtabmap:
  rgbd_odometry:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.10
      qos_image: 2
      qos_camera_info: 2
      Vis/EstimationType: "0"
      Vis/MinInliers: "5"
      Vis/MaxFeatures: "1000"
      Kp/MaxFeatures: "1000"
      Vis/InlierDistance: "0.55"
      Vis/CorNNDR: "0.80"
      Vis/MinDepth: "0.20"
      Vis/MaxDepth: "8"
      GFTT/MinDistance: "3"
      Reg/Force3DoF: "true"
      Odom/ImageDecimation: "1"
      Odom/ResetCountdown: "1"

  rtabmap:
    ros__parameters:
      use_sim_time: true
      frame_id: base_link
      subscribe_rgb: true
      subscribe_depth: true
      approx_sync: true
      topic_queue_size: 50
      sync_queue_size: 50
      approx_sync_max_interval: 0.10
      qos_image: 2
      qos_camera_info: 2
      RGBD/LinearUpdate: "0.02"
      RGBD/AngularUpdate: "0.01"
      Grid/FromDepth: "true"
      Grid/3D: "false"
