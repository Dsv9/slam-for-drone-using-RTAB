rtabmap:
  ros__parameters:
    use_sim_time: true
    frame_id: base_link
    subscribe_rgb: true
    subscribe_depth: true
    approx_sync: true
    # Per-node names rtabmap_sync reads (avoid leaving topic_queue_size at default 10).
    topic_queue_size: 40
    sync_queue_size: 40
    approx_sync_max_interval: 0.12
    # ros_gz_bridge uses sensor_data QoS → best effort. RELIABLE (1) often sees no callbacks.
    # RMW_QOS_POLICY_RELIABILITY_BEST_EFFORT = 2
    qos_image: 2
    qos_camera_info: 2
    RGBD/LinearUpdate: "0.02"
    RGBD/AngularUpdate: "0.01"
    Grid/FromDepth: "true"
    Grid/3D: "false"

rgbd_odometry:
  ros__parameters:
    use_sim_time: true
    frame_id: base_link
    subscribe_rgb: true
    subscribe_depth: true
    approx_sync: true
    topic_queue_size: 40
    sync_queue_size: 40
    approx_sync_max_interval: 0.12
    qos_image: 2
    qos_camera_info: 2
    # Visual odometry / ORB tuning for Gazebo (more features, slightly relaxed matching).
    Vis/MaxFeatures: "2500"
    Vis/InlierDistance: "0.04"
