# Bridges Gazebo Harmonic (GZ transport) ↔ ROS 2 with names expected by RTAB-Map / RViz.
#
# IMPORTANT (simple_drone model.sdf):
#   Sensor type must be rgbd_camera (RgbdCameraSensor). With <topic>/rgbd_camera</topic>,
#   Gazebo publishes aligned streams at:
#     /rgbd_camera/image
#     /rgbd_camera/depth_image
#     /rgbd_camera/camera_info
#     /rgbd_camera/points
#
# If you mistakenly use sdf type depth_camera (DepthCameraSensor), depth is published on the
# bare <topic> (not .../depth_image) and PointCloudPacked uses <topic>/points only when the base
# topic is not split that way—in practice ROS was bridged to /rgbd_camera/depth_image while
# Gazebo never advertised that string, so depth stayed empty ("Did not receive data since 5 s").
#
# Historical Harmonic setups sometimes exposed point clouds under /rgbd_camera/image/points when
# the depth-only sensor reused an /image-based prefix. With rgbd_camera here, /rgbd_camera/points
# is the native Gazebo topic—no remap required in this file.

- topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
  qos_profile: CLOCK

- topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- topic_name: /rgbd_camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA

- topic_name: /rgbd_camera/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA

- topic_name: /rgbd_camera/depth_image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA

- topic_name: /rgbd_camera/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
