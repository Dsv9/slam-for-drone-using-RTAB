# ros_gz parameter_bridge YAML (Harmonic ⇄ ROS 2 Jazzy).
#
# ROS side keeps RTAB-Map topic names (/rgbd_camera/...).
# GZ transport uses the same strings once the sdf <topic> is a base name (rgbd_camera),
# not rgbd_camera/image — see models/simple_drone/model.sdf.
#
# Explicit ros_topic_name + gz_topic_name avoids ambiguity if your shell or tools
# add/strip slashes; both sides use absolute-style names starting with '/'.
#
# frame_id override: Gazebo often puts a long scoped name in Image/Cloud headers.
# Align ROS headers with TF (base_link -> rgbd_camera) so RViz stops flagging red.

- topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
  qos_profile: CLOCK

- topic_name: /cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: /rgbd_camera/image
  gz_topic_name: /rgbd_camera/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
  frame_id: rgbd_camera

- ros_topic_name: /rgbd_camera/camera_info
  gz_topic_name: /rgbd_camera/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
  frame_id: rgbd_camera

- ros_topic_name: /rgbd_camera/depth_image
  gz_topic_name: /rgbd_camera/depth_image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
  frame_id: rgbd_camera

# Native RgbdCameraSensor point cloud publisher: /rgbd_camera/points
- ros_topic_name: /rgbd_camera/points
  gz_topic_name: /rgbd_camera/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA
  frame_id: rgbd_camera
